name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ─── TEST ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: card_system_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests (all workspaces)
        run: npm run test
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: test_password
          DB_NAME: card_system_test
          NODE_ENV: test
          ANALYTICS_ENABLED: false

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: ./
          flags: unittests

  # ─── BUILD ───────────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build

      - name: Upload API build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist/
          retention-days: 7

      - name: Upload Web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 7

  # ─── DEPLOY STAGING ──────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-dist
          path: api-dist/

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist/

      # Replace with actual deploy commands for your infra (Fly.io, Railway, AWS, etc.)
      - name: Deploy API to staging
        run: echo "Deploy API to staging environment"

      - name: Deploy Web to staging
        run: echo "Deploy Web to staging environment"

      - name: Run smoke tests
        run: echo "curl -f https://staging-api.example.com/health"

  # ─── DEPLOY PRODUCTION ───────────────────────────────────────────────────────
   deploy-production:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: write  # Required to create release tags

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-dist
          path: api-dist/

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist/

      - name: Deploy API to production
        run: echo "Deploy API to production"

      - name: Deploy Web to production
        run: echo "Deploy Web to production"

      - name: Health check
        run: echo "curl -f https://api.example.com/health"

      - name: Create Release Tag
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/release-${new Date().toISOString().replace(/[:.]/g, '-')}`,
              sha: context.sha
